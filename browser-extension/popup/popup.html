<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HistoryAI Shadow</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 280px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #e8ecf1;
        background: #1a1f2e;
        padding: 16px;
      }
      h1 { font-size: 14px; margin-bottom: 12px; }
      .status {
        padding: 8px 10px;
        border-radius: 8px;
        background: #121722;
        margin-bottom: 12px;
        font-size: 12px;
      }
      .status.connected { color: #4ade80; }
      .status.disconnected { color: #f87171; }
      button {
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        margin-bottom: 8px;
      }
      #connect-btn { background: #3b82f6; color: #fff; }
      #connect-btn:hover { background: #2563eb; }
      #disconnect-btn { background: #374151; color: #e8ecf1; display: none; }
      #disconnect-btn:hover { background: #4b5563; }
      a { color: #60a5fa; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>HistoryAI Shadow</h1>
    <div id="status" class="status disconnected">Checking connection…</div>
    <button id="connect-btn" type="button">Connect to Lumen</button>
    <button id="disconnect-btn" type="button">Disconnect</button>
    <p><a id="settings-link" href="#" target="_blank" rel="noopener">Open Lumen settings</a></p>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
