<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HistoryAI Shadow — Options</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        max-width: 480px;
        margin: 40px auto;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #1e293b;
        padding: 0 16px;
      }
      h1 { font-size: 20px; margin-bottom: 8px; }
      p { color: #64748b; margin-bottom: 24px; font-size: 13px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 16px;
      }
      button {
        padding: 10px 20px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { background: #2563eb; }
      #saved { color: #16a34a; font-size: 13px; margin-top: 12px; display: none; }
    </style>
  </head>
  <body>
    <h1>HistoryAI Shadow Options</h1>
    <p>Configure the Lumen API and web app URLs for this extension.</p>
    <form id="options-form">
      <label for="api-base">Lumen API base URL</label>
      <input
        id="api-base"
        name="apiBase"
        type="url"
        placeholder="http://localhost:8000"
        required
      />
      <label for="web-base">Lumen web app base URL</label>
      <input
        id="web-base"
        name="webBase"
        type="url"
        placeholder="http://localhost:5173"
        required
      />
      <button type="submit">Save</button>
    </form>
    <p id="saved">Settings saved.</p>
    <script type="module" src="./options.js"></script>
  </body>
</html>
