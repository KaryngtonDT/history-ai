# Lumen — production-like stack (no dev bind mounts on application source).
# Use: docker compose -f docker-compose.prod-like.yml up -d --build

name: history-ai-prod-like

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-history_ai}
      POSTGRES_USER: ${POSTGRES_USER:-history_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-history_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - history-ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-history_ai} -d ${POSTGRES_DB:-history_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - history-ai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - history-ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - history-ai
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://history_ai:history_ai@postgres:5432/history_ai?serverVersion=17&charset=utf8}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-redis://redis:6379/messages}
      STT_PROVIDER: ${STT_PROVIDER:-faster_whisper}
      STT_FASTER_WHISPER_MODEL: ${STT_FASTER_WHISPER_MODEL:-large-v3}
      HF_HOME: /models/hf-cache
      PIP_TARGET: /models/pip-packages
      PYTHONPATH: /models/pip-packages
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      TTS_PROVIDER: ${TTS_PROVIDER:-f5}
      VOICE_CLONE_PROVIDER: ${VOICE_CLONE_PROVIDER:-openvoice}
      LIP_SYNC_PROVIDER: ${LIP_SYNC_PROVIDER:-latentsync}
      VIDEO_RENDER_PROVIDER: ${VIDEO_RENDER_PROVIDER:-ffmpeg}
      WORKER_BASE_URL: ${WORKER_BASE_URL:-http://worker:8001}
      MODELS_ROOT: /models
    volumes:
      - lumen_storage:/var/www/html/storage
      - lumen_models:/models
    ports:
      - "8000:80"
    networks:
      - history-ai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: "http://localhost:8000"
    restart: unless-stopped
    command: npm run preview -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    networks:
      - history-ai
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker/Dockerfile
    restart: unless-stopped
    environment:
      SYMFONY_API_BASE_URL: ${SYMFONY_API_BASE_URL:-http://backend}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUMMARY_GENERATOR: ${SUMMARY_GENERATOR:-deterministic}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_EXECUTION_MODE: ${AI_EXECUTION_MODE:-balanced}
      PDF_STORAGE_DIR: /app/storage/uploads/pdf
      MODELS_ROOT: /models
    volumes:
      - lumen_storage:/app/storage
      - lumen_models:/models
    ports:
      - "8001:8001"
    networks:
      - history-ai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  history-ai:
    name: history-ai-prod-like
    driver: bridge

volumes:
  postgres_data:
    name: history-ai-prod-like-postgres-data
  redis_data:
    name: history-ai-prod-like-redis-data
  minio_data:
    name: history-ai-prod-like-minio-data
  lumen_storage:
    name: history-ai-prod-like-lumen-storage
  lumen_models:
    name: history-ai-prod-like-lumen-models
  ollama_data:
    name: history-ai-prod-like-ollama-data
