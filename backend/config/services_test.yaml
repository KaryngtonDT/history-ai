# Services exposed to integration / functional tests via TestContainer.
when@test:
    services:
        App\Domain\Processing\ProcessingJobRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Processing\DoctrineProcessingJobRepository
            public: true

        App\Application\Processing\Ports\ProcessingOrchestratorInterface:
            class: App\Infrastructure\Processing\NoOpProcessingOrchestrator
            public: true

        App\Domain\Artifact\ArtifactRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Artifact\DoctrineArtifactRepository
            public: true

        App\Domain\Library\LibraryItemRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Library\DoctrineLibraryRepository
            public: true

        App\Domain\Search\LibrarySearchRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Search\DoctrineLibrarySearchRepository
            public: true

        App\Domain\Collection\CollectionRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Collection\DoctrineCollectionRepository
            public: true

        App\Domain\CollectionItem\CollectionItemRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\CollectionItem\DoctrineCollectionItemRepository
            public: true

        App\Domain\Semantic\EmbeddingProviderInterface:
            factory: ['@App\Infrastructure\Semantic\EmbeddingProviderFactory', 'create']
            public: true

        App\Domain\Semantic\EmbeddingGeneratorInterface:
            alias: App\Infrastructure\Semantic\DeterministicEmbeddingGenerator
            public: true

        App\Domain\Semantic\VectorStoreInterface:
            alias: App\Infrastructure\Semantic\InMemoryVectorStore
            public: true

        App\Domain\Chat\ChatProviderInterface:
            factory: ['@App\Infrastructure\Chat\ChatProviderFactory', 'create']
            public: true

        App\Domain\Chat\StreamingChatProviderInterface:
            alias: App\Infrastructure\Chat\MockChatProvider
            public: true

        App\Domain\Chat\ConversationRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Chat\DoctrineConversationRepository
            public: true

        App\Domain\Video\VideoRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Video\DoctrineVideoRepository
            public: true

        App\Domain\Speech\TranscriptRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Speech\DoctrineTranscriptRepository
            public: true

        App\Domain\Translation\TranslationRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Translation\DoctrineTranslationRepository
            public: true

        App\Domain\TTS\AudioRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\TTS\DoctrineAudioRepository
            public: true

        App\Domain\VoiceClone\VoiceCloneRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\VoiceClone\DoctrineVoiceCloneRepository
            public: true

        App\Domain\LipSync\LipSyncRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\LipSync\DoctrineLipSyncRepository
            public: true

        App\Domain\VideoRender\FinalVideoRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\VideoRender\DoctrineFinalVideoRepository
            public: true

        App\Domain\Pipeline\PipelineConfigurationRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Pipeline\DoctrinePipelineConfigurationRepository
            public: true

        App\Infrastructure\Speech\FasterWhisperProcessRunnerInterface:
            class: App\Infrastructure\Speech\FixedFasterWhisperProcessRunner
            public: true

        App\Infrastructure\Translation\OllamaClientInterface:
            class: App\Infrastructure\Translation\FixedOllamaClient
            public: true

        App\Infrastructure\TTS\F5ProcessRunnerInterface:
            class: App\Infrastructure\TTS\FixedF5ProcessRunner
            public: true

        App\Infrastructure\VoiceClone\OpenVoiceProcessRunnerInterface:
            class: App\Infrastructure\VoiceClone\FixedOpenVoiceProcessRunner
            public: true

        App\Infrastructure\LipSync\LatentSyncProcessRunner:
            class: App\Infrastructure\LipSync\FixedLatentSyncProcessRunner
            public: true

        App\Infrastructure\VideoRender\FFmpegProcessRunner:
            class: App\Infrastructure\VideoRender\FixedFFmpegProcessRunner
            public: true

        App\Application\Video\Ports\VideoProcessingQueueInterface:
            class: App\Infrastructure\Video\NoOpVideoProcessingQueue
            public: true

        App\Domain\YouTube\YouTubeImporterInterface:
            class: App\Infrastructure\YouTube\MockYouTubeImporter
            public: true

        App\Domain\Source\SourceRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\Source\DoctrineSourceRepository
            public: true

        App\Domain\YouTube\YouTubeVideoRepositoryInterface:
            alias: App\Infrastructure\Persistence\Doctrine\YouTube\DoctrineYouTubeVideoRepository
            public: true

    parameters:
        video.storage_dir: '%kernel.cache_dir%/video-storage'
        youtube.download_dir: '%kernel.cache_dir%/youtube-downloads'
        tts.output_dir: '%kernel.cache_dir%/audio-storage'
        voice_clone.output_dir: '%kernel.cache_dir%/voice-clone-storage'
        lip_sync.output_dir: '%kernel.cache_dir%/lip-sync-storage'
        video_render.output_dir: '%kernel.cache_dir%/final-video-storage'
