# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    worker.base_url: '%env(WORKER_BASE_URL)%'
    gemini.embedding_model_default: 'text-embedding-004'
    gemini.chat_model_default: 'gemini-2.5-flash'
    embedding.provider_default: 'deterministic'
    chat.provider_default: 'mock'
    gemini.api_key_default: ''
    video.upload_max_bytes_default: 524288000

    video.upload_max_bytes: '%env(int:default:video.upload_max_bytes_default:VIDEO_UPLOAD_MAX_BYTES)%'
    video.storage_dir: '%kernel.project_dir%/var/video-storage'
    stt.provider_default: 'faster_whisper'
    stt.faster_whisper.binary_default: 'faster-whisper'
    stt.faster_whisper.model_default: 'base'
    translation.provider_default: 'ollama'
    translation.languages_default: 'fr,de'
    ollama.base_url_default: 'http://ollama:11434'
    ollama.model_default: 'qwen3'
    tts.provider_default: 'f5'
    tts.f5.binary_default: 'f5-tts'
    tts.f5.model_default: 'F5-TTS'
    tts.f5.base_path_default: '/models/f5'
    tts.output_dir: '%kernel.project_dir%/var/audio-storage'
    tts.generate_audio_default: false
    voice_clone.provider_default: 'openvoice'
    voice_clone.openvoice.binary_default: 'openvoice'
    voice_clone.openvoice.model_default: 'openvoice_v2'
    voice_clone.openvoice.base_path_default: '/models/openvoice'
    voice_clone.output_dir: '%kernel.project_dir%/var/voice-clone-storage'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Presentation\:
        resource: '../src/Presentation/'

    App\Application\:
        resource: '../src/Application/'

    App\Infrastructure\:
        resource: '../src/Infrastructure/'
        exclude:
            - '../src/Infrastructure/Semantic/EmbeddingProviderFactory.php'
            - '../src/Infrastructure/Chat/ChatProviderFactory.php'
            - '../src/Infrastructure/Speech/SpeechToTextProviderFactory.php'
            - '../src/Infrastructure/Translation/TranslationProviderFactory.php'
            - '../src/Infrastructure/TTS/TextToSpeechProviderFactory.php'
            - '../src/Infrastructure/VoiceClone/VoiceCloneProviderFactory.php'
            - '../src/Infrastructure/AI/AIEngineRegistryFactory.php'

    App\Domain\AI\AIEngineRegistry:
        factory: ['@App\Infrastructure\AI\AIEngineRegistryFactory', 'create']

    App\Domain\AI\AIEngineConfiguration:
        factory: ['@App\Infrastructure\AI\AIEngineRegistryFactory', 'createConfiguration']

    App\Domain\AI\AIProviderResolverInterface:
        alias: App\Infrastructure\AI\AIProviderResolver

    App\Infrastructure\AI\AIEngineRegistryFactory: ~

    App\Domain\Recommendation\RecommendationEngine: ~
    App\Domain\Recommendation\RecommendationScoringEngine: ~
    App\Domain\Semantic\Chunker: ~
    App\Domain\Semantic\SemanticRetriever: ~
    App\Domain\Chat\ChatOrchestrator: ~

    App\Domain\Agent\AgentPlannerInterface:
        alias: App\Infrastructure\Agent\DeterministicAgentPlanner

    App\Domain\Agent\AgentToolExecutorInterface:
        alias: App\Infrastructure\Agent\CompositeAgentToolExecutor

    App\Domain\Agent\ConversationMemoryToolExecutorInterface:
        alias: App\Infrastructure\Agent\ConversationMemoryToolExecutor

    App\Infrastructure\Agent\CompositeAgentToolExecutor:
        arguments:
            $semanticSearchToolExecutor: '@App\Infrastructure\Agent\SemanticSearchToolExecutor'
            $knowledgeGraphToolExecutor: '@App\Infrastructure\Agent\KnowledgeGraphToolExecutor'
            $conversationMemoryToolExecutor: '@App\Infrastructure\Agent\ConversationMemoryAgentToolExecutor'
            $multiDocumentChatToolExecutor: '@App\Infrastructure\Agent\MultiDocumentChatToolExecutor'
            $fallbackToolExecutor: '@App\Infrastructure\Agent\NullAgentToolExecutor'

    App\Domain\Chat\ChatProviderInterface:
        factory: ['@App\Infrastructure\Chat\ChatProviderFactory', 'create']

    App\Domain\Chat\StreamingChatProviderInterface:
        alias: App\Infrastructure\Chat\MockChatProvider

    App\Infrastructure\Chat\ChatProviderFactory:
        arguments:
            $providerName: '%env(default:chat.provider_default:CHAT_PROVIDER)%'
            $geminiApiKey: '%env(default:gemini.api_key_default:GEMINI_API_KEY)%'
            $mockProvider: '@App\Infrastructure\Chat\MockChatProvider'
            $geminiTransport: '@App\Infrastructure\Chat\CurlGeminiChatTransport'
            $geminiModel: '%env(default:gemini.chat_model_default:GEMINI_CHAT_MODEL)%'

    App\Infrastructure\Chat\CurlGeminiChatTransport:
        arguments:
            $apiKey: '%env(default:gemini.api_key_default:GEMINI_API_KEY)%'

    App\Infrastructure\Chat\GeminiChatProvider:
        arguments:
            $apiKey: '%env(default:gemini.api_key_default:GEMINI_API_KEY)%'
            $defaultModel: '%env(default:gemini.chat_model_default:GEMINI_CHAT_MODEL)%'

    App\Domain\Content\ContentRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Content\DoctrineContentRepository

    App\Domain\Processing\ProcessingJobRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Processing\DoctrineProcessingJobRepository

    App\Domain\Video\VideoRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Video\DoctrineVideoRepository

    App\Domain\Speech\TranscriptRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Speech\DoctrineTranscriptRepository

    App\Domain\Translation\TranslationRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Translation\DoctrineTranslationRepository

    App\Domain\TTS\AudioRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\TTS\DoctrineAudioRepository

    App\Application\TTS\GenerateAudioConfiguration:
        arguments:
            $enabled: '%env(bool:default:tts.generate_audio_default:GENERATE_AUDIO)%'

    App\Application\Translation\DefaultTranslationLanguagesProvider:
        arguments:
            $configuredLanguages: '%env(default:translation.languages_default:TRANSLATION_LANGUAGES)%'

    App\Infrastructure\Speech\FasterWhisperProcessRunnerInterface:
        alias: App\Infrastructure\Speech\ShellFasterWhisperProcessRunner

    App\Application\Video\Ports\VideoStorageInterface:
        alias: App\Infrastructure\Video\LocalVideoStorage

    App\Application\Video\Ports\VideoProcessingQueueInterface:
        alias: App\Infrastructure\Video\MessengerVideoProcessingQueue

    App\Domain\Artifact\ArtifactRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Artifact\DoctrineArtifactRepository

    App\Domain\Library\LibraryItemRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Library\DoctrineLibraryRepository

    App\Domain\Search\LibrarySearchRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Search\DoctrineLibrarySearchRepository

    App\Domain\Collection\CollectionRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Collection\DoctrineCollectionRepository

    App\Domain\CollectionItem\CollectionItemRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\CollectionItem\DoctrineCollectionItemRepository

    App\Domain\Chat\ConversationRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Chat\DoctrineConversationRepository

    App\Application\Processing\Ports\ProcessingOrchestratorInterface:
        alias: App\Infrastructure\Processing\HttpWorkerDispatcher

    App\Infrastructure\Semantic\EmbeddingProviderFactory:
        arguments:
            $providerName: '%env(default:embedding.provider_default:EMBEDDING_PROVIDER)%'
            $geminiApiKey: '%env(default:gemini.api_key_default:GEMINI_API_KEY)%'
            $deterministicProvider: '@App\Infrastructure\Semantic\DeterministicEmbeddingProvider'
            $geminiTransport: '@App\Infrastructure\Semantic\CurlGeminiEmbeddingTransport'
            $geminiModel: '%env(default:gemini.embedding_model_default:GEMINI_EMBEDDING_MODEL)%'

    App\Infrastructure\Semantic\UncachedEmbeddingProvider:
        factory: ['@App\Infrastructure\Semantic\EmbeddingProviderFactory', 'create']

    App\Domain\Semantic\EmbeddingCacheInterface:
        alias: App\Infrastructure\Semantic\InMemoryEmbeddingCache

    App\Infrastructure\Semantic\InMemoryEmbeddingCache:
        arguments:
            $maxSize: 1000

    App\Domain\Semantic\EmbeddingProviderInterface:
        class: App\Infrastructure\Semantic\CachedEmbeddingProvider
        arguments:
            $inner: '@App\Infrastructure\Semantic\UncachedEmbeddingProvider'
            $cache: '@App\Infrastructure\Semantic\InMemoryEmbeddingCache'

    App\Domain\Semantic\EmbeddingGeneratorInterface:
        alias: App\Infrastructure\Semantic\DeterministicEmbeddingGenerator

    App\Domain\Semantic\VectorStoreInterface:
        alias: App\Infrastructure\Semantic\InMemoryVectorStore

    App\Infrastructure\Processing\HttpWorkerDispatcher:
        arguments:
            $workerBaseUrl: '%worker.base_url%'

    App\Presentation\Console\Command\Semantic\GeminiEmbeddingSmokeTestCommand:
        arguments:
            $apiKey: '%env(default:gemini.api_key_default:GEMINI_API_KEY)%'
            $model: '%env(default:gemini.embedding_model_default:GEMINI_EMBEDDING_MODEL)%'

    App\Shared\:
        resource: '../src/Shared/'

    App\Application\Platform\RequestContextProviderInterface:
        alias: App\Infrastructure\Platform\RequestContextProvider

    App\Application\Platform\PlatformLoggerInterface:
        alias: App\Infrastructure\Platform\PlatformLogger

    App\Application\Platform\ClockInterface:
        alias: App\Infrastructure\Platform\SystemClock

    App\Infrastructure\Platform\InMemoryPerformanceMetricsStore:
        arguments:
            $maxSize: 100

    App\Infrastructure\Platform\CompositePerformanceMetricsRecorder:
        arguments:
            $recorders:
                - '@App\Infrastructure\Platform\LoggingPerformanceMetricsRecorder'
                - '@App\Infrastructure\Platform\InMemoryPerformanceMetricsStore'

    App\Application\Platform\PerformanceMetricsRecorderInterface:
        alias: App\Infrastructure\Platform\CompositePerformanceMetricsRecorder

    App\Application\Platform\PerformanceMetricsReaderInterface:
        alias: App\Infrastructure\Platform\InMemoryPerformanceMetricsStore

    Psr\Log\LoggerInterface:
        class: Psr\Log\NullLogger

    App\Application\Video\Handlers\UploadVideoHandler:
        arguments:
            $maxUploadBytes: '%video.upload_max_bytes%'

    App\Infrastructure\Video\LocalVideoStorage:
        arguments:
            $storageDirectory: '%video.storage_dir%'

    App\Domain\Speech\SpeechToTextProviderInterface:
        factory: ['@App\Infrastructure\Speech\SpeechToTextProviderFactory', 'create']

    App\Infrastructure\Speech\SpeechToTextProviderFactory:
        arguments:
            $providerName: '%env(default:stt.provider_default:STT_PROVIDER)%'

    App\Infrastructure\Speech\FasterWhisperProvider:
        arguments:
            $binary: '%env(default:stt.faster_whisper.binary_default:STT_FASTER_WHISPER_BINARY)%'
            $model: '%env(default:stt.faster_whisper.model_default:STT_FASTER_WHISPER_MODEL)%'

    App\Infrastructure\Translation\OllamaClientInterface:
        alias: App\Infrastructure\Translation\CurlOllamaClient

    App\Infrastructure\Translation\CurlOllamaClient:
        arguments:
            $baseUrl: '%env(default:ollama.base_url_default:OLLAMA_BASE_URL)%'

    App\Infrastructure\Translation\OllamaTranslationProvider:
        arguments:
            $model: '%env(default:ollama.model_default:OLLAMA_MODEL)%'

    App\Domain\Translation\TranslationProviderResolverInterface:
        alias: App\Infrastructure\Translation\TranslationProviderFactory

    App\Infrastructure\Translation\TranslationProviderFactory:
        arguments:
            $defaultProviderName: '%env(default:translation.provider_default:TRANSLATION_PROVIDER)%'

    App\Infrastructure\TTS\F5ProcessRunnerInterface:
        alias: App\Infrastructure\TTS\ShellF5ProcessRunner

    App\Infrastructure\TTS\F5TextToSpeechProvider:
        arguments:
            $binary: '%env(default:tts.f5.binary_default:TTS_F5_BINARY)%'
            $model: '%env(default:tts.f5.model_default:F5_MODEL)%'
            $basePath: '%env(default:tts.f5.base_path_default:F5_BASE_PATH)%'
            $outputDirectory: '%tts.output_dir%'

    App\Infrastructure\TTS\TextToSpeechProviderFactory:
        arguments:
            $defaultProviderName: '%env(default:tts.provider_default:TTS_PROVIDER)%'

    App\Infrastructure\VoiceClone\OpenVoiceProcessRunnerInterface:
        alias: App\Infrastructure\VoiceClone\ShellOpenVoiceProcessRunner

    App\Infrastructure\VoiceClone\OpenVoiceProvider:
        arguments:
            $binary: '%env(default:voice_clone.openvoice.binary_default:OPENVOICE_BINARY)%'
            $model: '%env(default:voice_clone.openvoice.model_default:OPENVOICE_MODEL)%'
            $basePath: '%env(default:voice_clone.openvoice.base_path_default:OPENVOICE_PATH)%'
            $outputDirectory: '%voice_clone.output_dir%'

    App\Infrastructure\VoiceClone\VoiceCloneProviderFactory:
        arguments:
            $defaultProviderName: '%env(default:voice_clone.provider_default:VOICE_CLONE_PROVIDER)%'
