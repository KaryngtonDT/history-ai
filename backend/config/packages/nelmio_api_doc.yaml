nelmio_api_doc:
    documentation:
        info:
            title: History AI API
            description: Public REST API for content, artifacts, library, collections, and search.
            version: 1.0.0
        openapi: 3.1.0
        servers:
            - url: http://localhost:8000
              description: Local development
    models:
        names:
            - { alias: ErrorResponse, type: App\Presentation\OpenApi\Schema\ErrorResponse }
            - { alias: ArtifactType, type: App\Presentation\OpenApi\Schema\ArtifactTypeSchema }
            - { alias: LibraryItemType, type: App\Presentation\OpenApi\Schema\LibraryItemTypeSchema }
            - { alias: Artifact, type: App\Presentation\OpenApi\Schema\Artifact }
            - { alias: LibraryItem, type: App\Presentation\OpenApi\Schema\LibraryItem }
            - { alias: SearchLibraryItem, type: App\Presentation\OpenApi\Schema\SearchLibraryItem }
    areas:
        default:
            path_patterns:
                - ^/api(?!/docs)
            with_attribute: false
            disable_default_routes: true
