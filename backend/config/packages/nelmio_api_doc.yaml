nelmio_api_doc:
    documentation:
        info:
            title: History AI API
            description: Public REST API for content, artifacts, library, collections, and search.
            version: 1.0.0
        openapi: 3.1.0
        servers:
            - url: http://localhost:8000
              description: Local development
    models:
        names:
            - { alias: ErrorResponse, type: App\Presentation\OpenApi\Schema\ErrorResponse }
            - { alias: ArtifactType, type: App\Presentation\OpenApi\Schema\ArtifactTypeSchema }
            - { alias: LibraryItemType, type: App\Presentation\OpenApi\Schema\LibraryItemTypeSchema }
            - { alias: Artifact, type: App\Presentation\OpenApi\Schema\Artifact }
            - { alias: LibraryItem, type: App\Presentation\OpenApi\Schema\LibraryItem }
            - { alias: SearchLibraryItem, type: App\Presentation\OpenApi\Schema\SearchLibraryItem }
            - { alias: Timeline, type: App\Presentation\OpenApi\Schema\Timeline }
            - { alias: TimelineSection, type: App\Presentation\OpenApi\Schema\TimelineSection }
            - { alias: TimelineEvent, type: App\Presentation\OpenApi\Schema\TimelineEvent }
            - { alias: 'Map', type: App\Presentation\OpenApi\Schema\Map }
            - { alias: HistoricalPlace, type: App\Presentation\OpenApi\Schema\HistoricalPlace }
            - { alias: Coordinates, type: App\Presentation\OpenApi\Schema\Coordinates }
            - { alias: ArtifactRelation, type: App\Presentation\OpenApi\Schema\ArtifactRelation }
            - { alias: ArtifactRelations, type: App\Presentation\OpenApi\Schema\ArtifactRelations }
            - { alias: ArtifactRelationType, type: App\Presentation\OpenApi\Schema\ArtifactRelationTypeSchema }
            - { alias: GraphNode, type: App\Presentation\OpenApi\Schema\GraphNode }
            - { alias: GraphEdge, type: App\Presentation\OpenApi\Schema\GraphEdge }
            - { alias: KnowledgeGraph, type: App\Presentation\OpenApi\Schema\KnowledgeGraph }
            - { alias: RecommendedArtifact, type: App\Presentation\OpenApi\Schema\RecommendedArtifact }
            - { alias: ArtifactRecommendations, type: App\Presentation\OpenApi\Schema\ArtifactRecommendations }
            - { alias: RecommendationReason, type: App\Presentation\OpenApi\Schema\RecommendationReasonSchema }
            - { alias: RetrievedChunk, type: App\Presentation\OpenApi\Schema\RetrievedChunk }
            - { alias: SemanticSearchResult, type: App\Presentation\OpenApi\Schema\SemanticSearchResult }
            - { alias: ChatRequest, type: App\Presentation\OpenApi\Schema\ChatRequest }
            - { alias: ChatAnswer, type: App\Presentation\OpenApi\Schema\ChatAnswer }
            - { alias: ChatSource, type: App\Presentation\OpenApi\Schema\ChatSource }
            - { alias: ChatCitation, type: App\Presentation\OpenApi\Schema\ChatCitation }
            - { alias: ChatStreamToken, type: App\Presentation\OpenApi\Schema\ChatStreamToken }
            - { alias: PerformanceMetric, type: App\Presentation\OpenApi\Schema\PerformanceMetric }
            - { alias: PerformanceMetricSnapshot, type: App\Presentation\OpenApi\Schema\PerformanceMetricSnapshot }
            - { alias: PlatformMetricsResponse, type: App\Presentation\OpenApi\Schema\PlatformMetricsResponse }
    areas:
        default:
            path_patterns:
                - ^/api(?!/docs)
                - ^/internal/platform
            with_attribute: false
            disable_default_routes: true
