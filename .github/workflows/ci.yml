name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/history_ai_test?serverVersion=17&charset=utf8
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: history_ai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d history_ai_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, pdo_pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Create backend env
        run: cp .env.test .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test database
        run: |
          DATABASE_URL='postgresql://postgres:postgres@127.0.0.1:5432/history_ai_test?serverVersion=17&charset=utf8' php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: PHPUnit
        run: |
          DATABASE_URL='postgresql://postgres:postgres@127.0.0.1:5432/history_ai_test?serverVersion=17&charset=utf8' php bin/phpunit

      - name: Architecture tests
        run: composer architecture

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_USE_MOCK: "false"
          VITE_API_BASE_URL: http://localhost:8000

      - name: Test
        run: npm test
        env:
          VITE_USE_MOCK: "true"

      - name: Biome check
        run: npm run check

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Pytest
        run: uv run pytest

      - name: Ruff check
        run: uv run ruff check .
