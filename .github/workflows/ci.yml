name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Create backend env
        run: cp .env.test .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test database
        run: |
          mkdir -p var
          touch var/test_ci.db
          echo "DATABASE_URL=sqlite:///$PWD/var/test_ci.db" >> .env.test.local
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: PHPUnit
        env:
          DATABASE_URL: sqlite:///${{ github.workspace }}/backend/var/test_ci.db
        run: php bin/phpunit

      - name: Architecture tests
        run: composer architecture

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_USE_MOCK: "false"
          VITE_API_BASE_URL: http://localhost:8000

      - name: Test
        run: npm test
        env:
          VITE_USE_MOCK: "true"

      - name: Biome check
        run: npm run check

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Pytest
        run: uv run pytest

      - name: Ruff check
        run: uv run ruff check .
